name: bazaar
description: A local-first Flutter shopping list app with barcode scanning, multi-store price tracking, AR/EN i18n, and ZIP backup.
publish_to: "none"
version: 1.3.8+6

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  sqflite: ^2.4.0
  sqflite_common_ffi: ^2.4.0
  path: ^1.9.0

  # Barcode scanning
  mobile_scanner: ^5.2.3

  # HTTP scraping
  http: ^1.2.1
  html: ^0.15.6
  collection: ^1.18.0

  # State management
  provider: ^6.1.2

  # Localization
  intl: ^0.20.2

  # Persistence
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.0.0

  # Share / Import-Export
  share_plus: ^12.0.2
  file_picker: ^8.0.0+1
  path_provider: ^2.1.3

  # Backup
  archive: ^3.6.1
  permission_handler: ^11.3.1

  # Receive shared JSON from other apps
  receive_sharing_intent: ^1.8.0

  # UI
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  image_picker: ^1.2.2
  package_info_plus: ^8.0.0
  google_generative_ai: ^0.4.6
  flutter_gemma: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/
    - assets/icons/

  # NOTE: NotoSansArabic is intentionally not registered as a font family
  # here. The system Arabic font on Android 10+, iOS 16+, and modern Linux
  # already renders the new Saudi Riyal symbol ﷼ (U+FDFC). To bundle it
  # explicitly, drop NotoSansArabic-Regular.ttf and NotoSansArabic-Bold.ttf
  # into assets/fonts/ and uncomment the block below.
  #
  # fonts:
  #   - family: NotoSansArabic
  #     fonts:
  #       - asset: assets/fonts/NotoSansArabic-Regular.ttf
  #       - asset: assets/fonts/NotoSansArabic-Bold.ttf
  #         weight: 700
