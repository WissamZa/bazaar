name: bazaar
description: A local-first Flutter shopping list app with barcode scanning, multi-store price tracking, AR/EN i18n, and ZIP backup.
publish_to: "none"
version: 1.3.8+6

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  # Barcode scanning
  mobile_scanner: ^5.2.3

  # HTTP scraping
  http: ^1.2.1
  html: ^0.15.6
  collection: ^1.18.0

  # State management
  provider: ^6.1.2

  # Localization
  intl: ^0.20.2

  # Persistence
  shared_preferences: ^2.2.3

  # ── NEW: Secure storage for API keys (Android Keystore / iOS Keychain) ──
  # v10+ pulls in flutter_secure_storage_linux 3.x which bundles a newer
  # nlohmann/json.hpp that doesn't trip Clang's -Wdeprecated-literal-operator.
  flutter_secure_storage: ^9.2.3

  # Share / Import-Export
  share_plus: ^12.0.2
  file_picker: ^8.0.0+1
  path_provider: ^2.1.3

  # Backup
  archive: ^3.6.1
  permission_handler: ^11.3.1

  # Receive shared JSON from other apps
  receive_sharing_intent: ^1.8.0

  # UI
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  image_picker: ^1.2.2
  package_info_plus: ^8.0.0

  # ── NEW: Cloud LLM providers (Tier 2) ──
  # Google Gemini — official Dart SDK, free tier 15 RPM
  google_generative_ai: ^0.4.6

  # ── NEW: On-device LLM (Tier 3) ──
  # flutter_gemma is the most mature Flutter binding for MediaPipe LLM
  # Inference. Despite the name, it runs Gemma, Llama 3.x, AND Qwen 2.5.
  # Requires native setup; see lib/core/services/on_device_llm.dart header.
  flutter_gemma: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/
    - assets/icons/
