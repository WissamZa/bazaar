name: Build Android APK

# Build a signed release APK on every push to main/master, on every PR,
# and on manual dispatch. The APK is uploaded as a workflow artifact.
#
# Required GitHub secrets (configure under Settings → Secrets and variables → Actions):
#
#   ANDROID_KEYSTORE_BASE64   Base64-encoded release keystore (.jks). Generate with:
#                             base64 -w 0 android/app/bazaar-release.jks
#   ANDROID_KEY_STORE_PASSWORD  Keystore password (the one you typed at "Keystore password:").
#   ANDROID_KEY_PASSWORD        Key password (same as keystore password by default).
#   ANDROID_KEY_ALIAS           Key alias — defaults to "bazaar" if you ran the
#                               provided scripts/generate_keystore.sh.
#
# If secrets are missing, the workflow falls back to a debug-signed APK so
# contributors can still verify the build without owning the release key.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Determine Version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Extract version from tag (e.g., v1.2.3 -> 1.2.3)
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
            echo "BUILD_NAME=$VERSION_NAME" >> $GITHUB_ENV
            echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
            echo "Using tag version: $VERSION_NAME (build ${{ github.run_number }})"
          else
            echo "Using version from pubspec.yaml"
          fi

      - name: Verify analysis
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Decode release keystore (if secret present)
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No keystore secret — build will use the debug signer."
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/bazaar-release.jks
          echo "Keystore decoded: $(ls -la android/app/bazaar-release.jks)"
          echo "has_keystore=true" >> "$GITHUB_OUTPUT"

      - name: Write key.properties (if secrets present)
        env:
          ANDROID_KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ "${{ steps.keystore.outputs.has_keystore }}" != "true" ]; then
            exit 0
          fi
          ALIAS="${ANDROID_KEY_ALIAS:-bazaar}"
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEY_STORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ALIAS}
          storeFile=android/app/bazaar-release.jks
          EOF
          echo "Wrote android/key.properties (alias=$ALIAS)"

      - name: Build APK
        run: |
          if [ -n "$BUILD_NAME" ]; then
            flutter build apk --split-per-abi --release --no-tree-shake-icons --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"
          else
            flutter build apk --split-per-abi --release --no-tree-shake-icons
          fi

      - name: Locate and Rename APKs
        id: apks
        run: |
          mkdir -p release_apks
          SHORT_SHA=${GITHUB_SHA::7}
          if [ "${{ steps.keystore.outputs.has_keystore }}" = "true" ]; then
            SUFFIX="signed"
          else
            SUFFIX="debug-signed"
          fi

          # Find all split APKs
          find build/app/outputs/flutter-apk -name 'app-*-release.apk' | while read apk; do
            FILENAME=$(basename "$apk")
            # Example: app-arm64-v8a-release.apk -> bazaar-arm64-v8a-f1a2b3c-signed.apk
            ABI=$(echo "$FILENAME" | cut -d'-' -f2)
            cp "$apk" "release_apks/bazaar-${ABI}-${SHORT_SHA}-${SUFFIX}.apk"
          done

          # Also find the fat APK if it exists
          FAT_APK=$(find build/app/outputs/flutter-apk -name 'app-release.apk' | head -1)
          if [ -n "$FAT_APK" ]; then
            cp "$FAT_APK" "release_apks/bazaar-universal-${SHORT_SHA}-${SUFFIX}.apk"
          fi

          echo "apks_path=release_apks/*.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bazaar-apks
          path: release_apks/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach APKs to release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release_apks/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
