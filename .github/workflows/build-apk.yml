name: Build Android APK

# Build a signed release APK on every push to main/master, on every PR,
# and on manual dispatch. The APK is uploaded as a workflow artifact.
#
# Required GitHub secrets (configure under Settings → Secrets and variables → Actions):
#
#   ANDROID_KEYSTORE_BASE64   Base64-encoded release keystore (.jks). Generate with:
#                             base64 -w 0 android/app/bazaar-release.jks
#   ANDROID_KEY_STORE_PASSWORD  Keystore password (the one you typed at "Keystore password:").
#   ANDROID_KEY_PASSWORD        Key password (same as keystore password by default).
#   ANDROID_KEY_ALIAS           Key alias — defaults to "bazaar" if you ran the
#                               provided scripts/generate_keystore.sh.
#
# If secrets are missing, the workflow falls back to a debug-signed APK so
# contributors can still verify the build without owning the release key.

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Verify analysis
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Decode release keystore (if secret present)
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No keystore secret — build will use the debug signer."
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > bazaar-release.jks
          echo "Keystore decoded: $(ls -la bazaar-release.jks)"
          echo "has_keystore=true" >> "$GITHUB_OUTPUT"

      - name: Write key.properties (if secrets present)
        env:
          ANDROID_KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD:       ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS:          ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ "${{ steps.keystore.outputs.has_keystore }}" != "true" ]; then
            exit 0
          fi
          ALIAS="${ANDROID_KEY_ALIAS:-bazaar}"
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEY_STORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ALIAS}
          storeFile=android/app/bazaar-release.jks
          EOF
          echo "Wrote android/key.properties (alias=$ALIAS)"

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk -name '*.apk' | head -1)
          echo "APK path: $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          # Rename to include short SHA + signing mode for clarity.
          SHORT_SHA=${GITHUB_SHA::7}
          if [ "${{ steps.keystore.outputs.has_keystore }}" = "true" ]; then
            SUFFIX="signed"
          else
            SUFFIX="debug-signed"
          fi
          cp "$APK_PATH" "bazaar-${SHORT_SHA}-${SUFFIX}.apk"
          echo "name=bazaar-${SHORT_SHA}-${SUFFIX}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazaar-apk
          path: ${{ steps.apk.outputs.name }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
